<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selin777 | Infrastructure Terminal</title>
    
    <script src="https://unpkg.com"></script>
    <script src="https://telegram.org"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    
    <style>
        :root { --accent: #3b82f6; --bg: #010307; }
        body { background: var(--bg); font-family: 'Manrope', sans-serif; color: white; overflow-x: hidden; height: 100vh; }
        .bg-glow { position: fixed; inset: 0; background: radial-gradient(circle at 80% 20%, rgba(59, 130, 246, 0.08) 0%, transparent 50%), radial-gradient(circle at 20% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 50%); z-index: -1; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 28px; transition: 0.4s; }
        
        .logo-frame { width: 50px; height: 50px; background: white; border-radius: 12px; padding: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .ruble-icon { width: 45px; height: 45px; margin-left: 15px; border-radius: 50%; border: 1px solid rgba(59, 130, 246, 0.3); box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); animation: breathe 4s infinite ease-in-out; object-fit: cover; }
        @keyframes breathe { 0%, 100% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.05); filter: brightness(1.2); } }

        #ton-connect-button button { background: #3b82f6 !important; border-radius: 12px !important; font-size: 10px !important; font-weight: 800 !important; color: white !important; height: 42px !important; }
        .btn-action { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; transition: 0.2s; font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.2em; color: #94a3b8; }
        .btn-action:hover { background: var(--accent); color: white; border-color: transparent; transform: translateY(-2px); }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(30px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .ledger-line { font-family: monospace; font-size: 8px; color: #3b82f6; opacity: 0.8; margin-bottom: 2px; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="bg-glow"></div>

    <!-- Header -->
    <header class="max-w-6xl mx-auto flex justify-between items-start mb-16">
        <div class="flex items-center gap-5">
            <div class="logo-frame"><img src="logo.jpg" class="w-full h-full object-contain rounded-lg" alt="Selin777"></div>
            <div>
                <h1 class="text-2xl font-800 tracking-tighter uppercase italic leading-none mb-2">Selin<span class="text-blue-500">777</span></h1>
                <div class="flex items-center gap-2">
                    <span id="net-dot" class="w-1.5 h-1.5 bg-yellow-500 rounded-full animate-pulse"></span>
                    <span id="net-status" class="text-[7px] text-gray-500 uppercase tracking-widest font-bold font-mono">Node: Securing Connection...</span>
                </div>
            </div>
        </div>
        <div id="ton-connect-button"></div>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-8">
        <!-- Asset Terminal -->
        <div class="lg:col-span-3 glass-card p-10 relative overflow-hidden">
            <div class="flex justify-between items-start mb-12">
                <div>
                    <p class="text-[9px] text-gray-600 uppercase tracking-[0.5em] font-800 mb-4 italic">Global Liquidity Pool</p>
                    <div class="flex items-center">
                        <div class="text-7xl font-800 tracking-tighter italic">0<span class="text-blue-600">.00</span></div>
                        <img src="ruble.jpg" class="ruble-icon" alt="">
                    </div>
                </div>
                <div class="text-right">
                    <span id="auth-badge" class="text-[8px] text-yellow-500 font-800 border border-yellow-500/20 px-3 py-1 rounded-full uppercase italic bg-yellow-500/5">Awaiting Key</span>
                </div>
            </div>

            <!-- Controllers -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12">
                <button onclick="openPanel('deposit')" class="btn-action py-6">Deposit</button>
                <button onclick="openPanel('withdraw')" class="btn-action py-6">Withdraw</button>
                <button onclick="openPanel('swap')" class="btn-action py-6">Exchange</button>
                <button onclick="openPanel('node')" class="btn-action py-6">Core Config</button>
            </div>

            <!-- Live Ledger -->
            <div class="bg-black/40 rounded-3xl p-6 border border-white/5 h-28 overflow-hidden relative">
                <div class="absolute top-2 left-6 text-[7px] text-gray-700 font-bold uppercase tracking-[0.4em]">Live Network Stream (ISO 20022)</div>
                <div id="ledger-box" class="mt-4 flex flex-col font-mono"></div>
            </div>
        </div>

        <!-- Sidebar -->
        <div class="lg:col-span-1 glass-card p-10 flex flex-col justify-between border-t-2 border-blue-600">
            <div>
                <h3 class="text-[10px] font-800 uppercase tracking-widest mb-6 text-blue-500 italic">Infrastructure</h3>
                <div class="space-y-4 text-[9px] text-gray-500 uppercase font-bold italic">
                    <p>Status: <span class="text-white">Active Node</span></p>
                    <p>Standard: <span class="text-white">ISO-20022</span></p>
                    <p>Encryption: <span class="text-white">GOST-777</span></p>
                </div>
            </div>
            <div id="wallet-info" class="text-[7px] text-gray-800 font-bold uppercase break-all font-mono opacity-50 italic">Session Unauthorized</div>
        </div>
    </main>

    <!-- UI Terminal Modal -->
    <div id="modal-terminal" class="modal-overlay">
        <div class="glass-card max-w-sm w-full p-12 text-center border-blue-500/30 shadow-2xl">
            <h4 id="m-title" class="text-2xl font-800 uppercase italic mb-6 tracking-tighter text-blue-500">Terminal</h4>
            <div id="m-body" class="text-[11px] text-gray-400 uppercase tracking-[0.2em] leading-relaxed mb-12 italic font-bold"></div>
            <button onclick="closePanel()" class="w-full py-5 btn-action text-white hover:bg-blue-600 transition">Close Gateway</button>
        </div>
    </div>

    <script>
        // Telegram & TON Connect Integration
        const tg = window.Telegram.WebApp;
        tg.expand();

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://vselin662-ops.github.io',
            buttonRootId: 'ton-connect-button'
        });

        // Отслеживание кошелька
        tonConnectUI.onStatusChange(wallet => {
            const badge = document.getElementById('auth-badge');
            const dot = document.getElementById('net-dot');
            const stat = document.getElementById('net-status');
            const info = document.getElementById('wallet-info');

            if (wallet) {
                badge.innerText = "Identity Verified";
                badge.classList.replace('text-yellow-500', 'text-green-400');
                dot.classList.replace('bg-yellow-500', 'bg-green-500');
                stat.innerText = "Node: Authorized Connection";
                info.innerText = wallet.account.address;
                info.style.opacity = "1";
                tg.HapticFeedback.notificationOccurred('success');
            } else {
                badge.innerText = "Awaiting Key";
                dot.classList.replace('bg-green-500', 'bg-yellow-500');
                stat.innerText = "Node: Securing Connection...";
                info.style.opacity = "0.5";
            }
        });

        // Функция открытия терминалов
        function openPanel(type) {
            tg.HapticFeedback.impactOccurred('medium');
            const modal = document.getElementById('modal-terminal');
            const title = document.getElementById('m-title');
            const body = document.getElementById('m-body');

            const content = {
                deposit: ["Deposit Terminal", "Establish secure bridge to CBR Digital Platform.<br>Select Asset Source to initiate injection."],
                withdraw: ["Withdraw Terminal", "Specify exit node for CBDC liquidity.<br>Verification required for external settlement."],
                swap: ["Swap Engine", "Market Ratio: 1.00 TON / 642.50 ₽Ц<br>Calculating real-time spread... Ready."],
                node: ["Core Config", "Selin777 Node ID: " + (tonConnectUI.connected ? "Active" : "Pending") + "<br>Uptime: 99.9% | Latency: 14ms"]
            };

            title.innerText = content[type][0];
            body.innerHTML = content[type][1];
            modal.classList.add('active');
        }

        function closePanel() { document.getElementById('modal-terminal').classList.remove('active'); }

        // Live Ledger Stream
        setInterval(() => {
            const box = document.getElementById('ledger-box');
            const line = document.createElement('div');
            line.className = 'ledger-line';
            const h = Math.random().toString(36).substring(7).toUpperCase();
            line.innerText = `[${new Date().toLocaleTimeString()}] SYNC_BLOCK: #${Math.floor(Math.random()*9999)} -> HASH: ${h}... OK.`;
            if (box.childNodes.length > 5) box.removeChild(box.firstChild);
            box.appendChild(line);
        }, 2500);

        window.onclick = (e) => { if (e.target == document.getElementById('modal-terminal')) closePanel(); }
    </script>
</body>
</html>
