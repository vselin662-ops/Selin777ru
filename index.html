<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Selin777 | Infrastructure Terminal</title>

    <!-- Подключаем библиотеки -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com/3.4.1/tailwind.min.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui-remote/dist/tonconnect-ui-remote.umd.js"></script>

    <style>
        :root { --accent: #3b82f6; --bg: #010307; }
        body {
            background: var(--bg);
            font-family: sans-serif;
            color: white;
            margin: 0;
            padding: 16px;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .bg-glow {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 80% 20%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 20% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
            z-index: -1;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 28px;
            transition: transform 0.4s ease;
        }
        .logo-frame {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 12px;
            padding: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .ruble-icon {
            width: 45px;
            height: 45px;
            margin-left: 15px;
            border-radius: 50%;
            border: 1px solid rgba(59, 130, 246, 0.3);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
            animation: breathe 4s infinite ease-in-out;
            object-fit: cover;
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.05); filter: brightness(1.2); }
        }
        #ton-connect-button button {
            background: #3b82f6 !important;
            border-radius: 12px !important;
            font-size: 10px !important;
            font-weight: 800 !important;
            color: white !important;
            height: 42px !important;
        }
        .btn-action {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            transition: all 0.2s ease;
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #94a3b8;
            cursor: pointer;
            padding: 12px 24px;
        }
        .btn-action:hover {
            background: rgba(255, 255, 255, 0.08);
        }
        .btn-action:active {
            transform: scale(0.95);
            background: var(--accent);
            color: white;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(30px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .ledger-line {
            font-family: monospace;
            font-size: 8px;
            color: #3b82f6;
            opacity: 0.8;
            margin-bottom: 2px;
        }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="bg-glow"></div>

    <header class="max-w-6xl mx-auto flex justify-between items-start mb-16">
        <div class="flex items-center gap-5">
            <div class="logo-frame">
                <img src="logo.jpg" class="w-full h-full object-contain rounded-lg" alt="Логотип Selin777" onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\"w-12 h-12 bg-white rounded-lg flex items-center justify-center text-xs\">S777</div>'">
            </div>
            <div>
                <h1 class="text-2xl font-black tracking-tighter uppercase italic leading-none mb-2">Selin<span class="text-blue-500">777</span></h1>
                <div class="flex items-center gap-2">
                    <span id="net-dot" class="w-1.5 h-1.5 bg-yellow-500 rounded-full animate-pulse"></span>
            <span id="net-status" class="text-[7px] text-gray-500 uppercase tracking-widest font-bold font-mono">Node: Securing Connection...</span>
                </div>
            </div>
        </div>
        <div id="ton-connect-button"></div>
    </header>


    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-8">
        <div class="lg:col-span-3 glass-card p-10 relative overflow-hidden">
            <div class="flex justify-between items-start mb-12">
                <div>
                    <p class="text-[9px] text-gray-600 uppercase tracking-[0.5em] font-800 mb-4 italic">Global Liquidity Pool</p>
            <div class="flex items-center">
                        <div class="text-7xl font-800 tracking-tighter italic"><span id="main-balance">12 500</span><span class="text-blue-600">.00</span></div>
                        <img src="ruble.jpg" class="ruble-icon" alt="Символ рубля" onerror="this.style.display='none'">
                    </div>
                </div>
                <div class="text-right">
            <span id="auth-badge" class="text-[8px] text-yellow-500 font-800 border border-yellow-500/20 px-3 py-1 rounded-full uppercase italic bg-yellow-500/5">Authenticated</span>
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12">
                <button class="btn-action py-6">Deposit</button>
                <button
