<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Selin Premium Elite</title>
    <script src="https://telegram.org"></script>
    <style>
        :root { --main-color: #00f2ff; --bg-color: #0a0b10; --accent-color: #7000ff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: radial-gradient(circle at center, #1a1c2c 0%, var(--bg-color) 100%); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        
        .screen { display: none; flex-direction: column; align-items: center; width: 100%; height: 100%; padding: 20px; padding-top: 40px; }
        .screen.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .score-container { font-size: 56px; font-weight: 900; margin-top: 20px; text-shadow: 0 0 20px rgba(0, 242, 255, 0.4); }
        
        /* Стили монеты */
        .coin-wrapper { position: relative; margin-top: 30px; }
        .main-coin { width: 280px; height: 280px; border-radius: 50%; border: 8px solid rgba(255, 255, 255, 0.05); box-shadow: 0 0 50px rgba(0, 242, 255, 0.1); object-fit: cover; transition: transform 0.05s; user-select: none; }

        /* Энергия */
        .energy-container { width: 80%; margin-top: 40px; text-align: left; }
        .energy-text { font-size: 18px; font-weight: bold; margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }
        .energy-bar-bg { width: 100%; height: 12px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .energy-bar-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ffe600, #ff9900); transition: width 0.2s; }

        .plus-one { position: absolute; color: var(--main-color); font-size: 32px; font-weight: bold; pointer-events: none; animation: floatUp 0.7s forwards; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }

        .nav-menu { position: fixed; bottom: 20px; width: 92%; background: rgba(15, 16, 25, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; display: flex; justify-content: space-around; padding: 12px 0; }
        .nav-item { color: #555; font-size: 11px; border: none; background: none; cursor: pointer; transition: 0.2s; }
        .nav-item.active { color: var(--main-color); }
        .card { background: rgba(255,255,255,0.03); width: 100%; border-radius: 20px; padding: 20px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <audio id="tap-sound" src="tap.mp3" preload="auto"></audio>

    <div id="game-screen" class="screen active">
        <div class="score-container" id="score">0</div>
        
        <div class="coin-wrapper" id="click-area">
            <img src="IMG_20260304_134158_002.webp" class="main-coin" id="coin-img">
        </div>

        <div class="energy-container">
            <div class="energy-text">⚡️ <span id="energy-val">1000</span> / 1000</div>
            <div class="energy-bar-bg"><div class="energy-bar-fill" id="energy-fill"></div></div>
        </div>
    </div>

    <!-- Другие экраны (Друзья, Бусты, Вывод) -->
    <div id="friends-screen" class="screen"><h2>👥 Друзья</h2><div class="card"><p>Приглашай и получай бонусы!</p></div></div>
    <div id="boosts-screen" class="screen"><h2>⚡ Бусты</h2><div class="card"><p>Скоро: Увеличение лимита энергии</p></div></div>
    <div id="withdraw-screen" class="screen"><h2>💰 Вывод</h2><div class="card"><p>Минимум: 1,000,000</p></div></div>

    <div class="nav-menu">
        <button onclick="showScreen('game-screen', this)" class="nav-item active">🏠<br>Игра</button>
        <button onclick="showScreen('friends-screen', this)" class="nav-item">👥<br>Друзья</button>
        <button onclick="showScreen('boosts-screen', this)" class="nav-item">⚡<br>Бусты</button>
        <button onclick="showScreen('withdraw-screen', this)" class="nav-item">💰<br>Вывод</button>
    </div>

    <script>
        let score = parseInt(localStorage.getItem('selin_score')) || 0;
        let energy = parseInt(localStorage.getItem('selin_energy')) || 1000;
        let lastTime = parseInt(localStorage.getItem('selin_last_time')) || Date.now();

        const scoreEl = document.getElementById('score');
        const energyVal = document.getElementById('energy-val');
        const energyFill = document.getElementById('energy-fill');
        const coinImg = document.getElementById('coin-img');
        const tapSound = document.getElementById('tap-sound');

        // Восстановление энергии со временем
        function recoverEnergy() {
            const now = Date.now();
            const diff = Math.floor((now - lastTime) / 1000); // секунд прошло
            if (diff > 0) {
                energy = Math.min(1000, energy + diff);
                lastTime = now;
            }
            updateUI();
        }

        function updateUI() {
            scoreEl.innerText = score.toLocaleString();
            energyVal.innerText = energy;
            energyFill.style.width = (energy / 10) + '%';
            localStorage.setItem('selin_score', score);
            localStorage.setItem('selin_energy', energy);
            localStorage.setItem('selin_last_time', lastTime);
        }

        document.getElementById('click-area').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (energy <= 0) return; // Нет энергии - нет клика

            // Эффект нажатия
            energy--;
            score++;
            
            // Визуал +1
            const touch = e.touches[0];
            const plus = document.createElement('div');
            plus.className = 'plus-one';
            plus.innerText = '+1';
            plus.style.left = touch.clientX + 'px';
            plus.style.top = touch.clientY + 'px';
            document.body.appendChild(plus);
            setTimeout(() => plus.remove(), 700);

            // Анимация монеты
            coinImg.style.transform = 'scale(0.95)';
            setTimeout(() => coinImg.style.transform = 'scale(1)', 50);

            tapSound.currentTime = 0;
            tapSound.play().catch(()=>{});

            updateUI();
            if (window.Telegram?.WebApp?.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
            }
        });

        function showScreen(screenId, btn) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        setInterval(recoverEnergy, 1000);
        updateUI();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
