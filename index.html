<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selin777 | CBDC & TON Node</title>
    
    <!-- SDK для TON Connect и Telegram -->
    <script src="https://unpkg.com"></script>
    <script src="https://telegram.org"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    
    <style>
        :root { --accent: #3b82f6; --bg: #010307; }
        body { background: var(--bg); font-family: 'Manrope', sans-serif; color: white; overflow-x: hidden; }
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 80% 20%, rgba(59, 130, 246, 0.06) 0%, transparent 50%), radial-gradient(circle at 20% 80%, rgba(139, 92, 246, 0.04) 0%, transparent 50%); z-index: -1; }
        .glass-card { background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(45px) saturate(160%); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 32px; transition: 0.4s; }
        .logo-frame { width: 58px; height: 58px; background: white; border-radius: 16px; padding: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: float 5s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
        
        /* Стилизация кнопки TON Connect под наш дизайн */
        #ton-connect-button button { background: rgba(255, 255, 255, 0.03) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; border-radius: 20px !important; font-family: 'Manrope' !important; font-size: 10px !important; text-transform: uppercase !important; letter-spacing: 0.2em !important; height: 45px !important; }
        
        .btn-action { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; transition: 0.3s; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.2em; }
        .btn-action:hover { background: var(--accent); color: white; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4); }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="bg-glow"></div>

    <!-- Header -->
    <header class="max-w-6xl mx-auto flex justify-between items-center mb-24">
        <div class="flex items-center gap-6">
            <div class="logo-frame"><img src="logo.jpg" class="w-full h-full object-contain rounded-xl" alt="Selin777"></div>
            <div>
                <h1 class="text-3xl font-800 tracking-tighter uppercase italic leading-tight">Selin<span class="text-blue-500">777</span></h1>
                <div class="flex items-center gap-2">
                    <span id="network-status" class="w-1.5 h-1.5 bg-yellow-500 rounded-full animate-pulse"></span>
                    <span id="status-text" class="text-[8px] text-gray-600 uppercase tracking-[0.4em] font-bold italic font-mono">Status: Awaiting Wallet</span>
                </div>
            </div>
        </div>
        <!-- Место для кнопки TON Connect -->
        <div id="ton-connect-button"></div>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-8">
        <!-- Terminal -->
        <div class="lg:col-span-3 glass-card p-12 relative overflow-hidden">
            <div class="flex justify-between items-start mb-14">
                <div>
                    <h2 class="text-gray-600 text-[10px] uppercase tracking-[0.5em] font-800 mb-4 italic">Личные цифровые активы</h2>
                    <div class="text-8xl font-800 tracking-tighter italic">0<span class="text-blue-600">.00</span> <span class="text-2xl align-top text-gray-800 italic">₽Ц</span></div>
                </div>
                <div class="text-right">
                    <span id="auth-badge" class="text-[9px] text-yellow-500 font-800 uppercase tracking-[0.2em] italic border border-yellow-500/30 px-4 py-2 rounded-full">Disconnected</span>
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <button class="btn-action p-6" onclick="handleTx()">Deposit</button>
                <button class="btn-action p-6" onclick="handleTx()">Withdraw</button>
                <button class="btn-action p-6" onclick="handleTx()">Swap</button>
                <button class="btn-action p-6 opacity-30">Node 777</button>
            </div>
        </div>

        <div class="lg:col-span-1 glass-card p-10 flex flex-col justify-between border-t-2 border-blue-600">
            <div>
                <h3 class="text-xs font-800 uppercase tracking-widest mb-6 text-blue-500 italic">Selin-Ledger v1</h3>
                <p class="text-[10px] text-gray-500 leading-relaxed uppercase font-bold tracking-[0.1em] mb-8">
                    Имитация финансового узла для интеграции в Telegram & Платформу ЦР.
                </p>
            </div>
            <div class="space-y-3 pt-6 border-t border-white/5">
                <div id="wallet-address" class="text-[7px] text-gray-700 font-bold uppercase truncate">Connect Wallet to view address</div>
                <div class="text-[8px] text-gray-800 font-bold uppercase italic">Security: TON Connect SDK 2.0</div>
            </div>
        </div>
    </main>

    <footer class="max-w-6xl mx-auto mt-32 pb-12 flex flex-col md:flex-row justify-between items-center text-[9px] text-gray-800 font-bold uppercase tracking-[0.5em] italic">
        <span>&copy; 2026 Selin777 Infrastructure</span>
        <span class="mt-4 md:mt-0 opacity-40">Blockchain & CBDC Sandbox</span>
    </footer>

    <script>
        // Инициализация TON Connect
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://vselin662-ops.github.io',
            buttonRootId: 'ton-connect-button'
        });

        // Отслеживание состояния кошелька
        tonConnectUI.onStatusChange(wallet => {
            const statusText = document.getElementById('status-text');
            const networkStatus = document.getElementById('network-status');
            const authBadge = document.getElementById('auth-badge');
            const walletAddr = document.getElementById('wallet-address');

            if (wallet) {
                statusText.innerText = "Status: Wallet Connected";
                networkStatus.classList.replace('bg-yellow-500', 'bg-green-500');
                authBadge.innerText = "Authorized";
                authBadge.classList.replace('text-yellow-500', 'text-green-500');
                authBadge.classList.replace('border-yellow-500/30', 'border-green-500/30');
                walletAddr.innerText = "Addr: " + wallet.account.address;
                console.log('Wallet connected:', wallet);
            } else {
                statusText.innerText = "Status: Awaiting Wallet";
                networkStatus.classList.replace('bg-green-500', 'bg-yellow-500');
                authBadge.innerText = "Disconnected";
                walletAddr.innerText = "Connect Wallet to view address";
            }
        });

        function handleTx() {
            if (!tonConnectUI.connected) {
                alert("Пожалуйста, сначала подключите ваш TON кошелек!");
                tonConnectUI.openModal();
            } else {
                alert("Функция транзакций будет доступна после интеграции с Sandbox ЦБ.");
            }
        }
    </script>
</body>
</html>
